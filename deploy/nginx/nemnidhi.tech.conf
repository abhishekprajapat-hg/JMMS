server {
  listen 80;
  listen [::]:80;
  server_name nemnidhi.tech www.nemnidhi.tech;

  # Backend API and static uploads/receipts
  location /api/ {
    proxy_pass http://127.0.0.1:5200/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://127.0.0.1:5200/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /receipts/ {
    proxy_pass http://127.0.0.1:5200/receipts/;
    proxy_set_header Host $host;
  }

  location /uploads/ {
    proxy_pass http://127.0.0.1:5200/uploads/;
    proxy_set_header Host $host;
  }

  # Admin frontend on /admin
  location ^~ /admin/ {
    alias /var/www/nemnidhi.tech/admin/;
    try_files $uri $uri/ /admin/index.html;
  }

  # User frontend on /
  root /var/www/nemnidhi.tech/user;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
